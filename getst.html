<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Get Started | Santino AI</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
 <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
 <link rel="stylesheet" href="style.css">
</head>

<body class="gs-body">

 <nav class="gs-nav">
  <svg class="img-sign" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
   <style>
    .s {
     stroke: #2a0008;
     fill: none;
     stroke-linecap: square;
     stroke-linejoin: miter
    }
  
    .f {
     fill: #2a0008;
    }
  
    .nm {
     fill: #2a0008;
     font-family: sans-serif;
     font-weight: 400;
     letter-spacing: 4px;
     font-size: 15px
    }
  
    .vd {
     stroke: #2a0008;
     stroke-width: 0.6;
     opacity: 0.3
    }
   </style>
  
   <!-- hexcore symbol centered at x=20 y=20 -->
   <g transform="translate(20,20)">
    <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" class="s" stroke-width="1.4" />
    <polygon points="0,-10 8.7,-5 8.7,5 0,10 -8.7,5 -8.7,-5" class="s" stroke-width="0.7" />
    <line x1="0" y1="-10" x2="0" y2="-18" class="s" stroke-width="0.8" />
    <line x1="8.7" y1="-5" x2="15.6" y2="-9" class="s" stroke-width="0.8" />
    <line x1="8.7" y1="5" x2="15.6" y2="9" class="s" stroke-width="0.8" />
    <line x1="0" y1="10" x2="0" y2="18" class="s" stroke-width="0.8" />
    <line x1="-8.7" y1="5" x2="-15.6" y2="9" class="s" stroke-width="0.8" />
    <line x1="-8.7" y1="-5" x2="-15.6" y2="-9" class="s" stroke-width="0.8" />
    <circle cx="0" cy="0" r="3" class="f" />
   </g>
  
   <!-- divider -->
   <line x1="44" y1="8" x2="44" y2="32" class="vd" />
  
   <!-- brand name -->
   <text x="54" y="25" class="nm">SANTINO</text>
  </svg>

  <a class="gs-back-btn" href="index.html">
   <i class="fa-solid fa-arrow-left"></i> Back
  </a>
 </nav>

 <main class="gs-container">
  <div class="gs-card">
   <div class="gs-icon">
    <i class="fa-solid fa-rocket"></i>
   </div>

   <h1 class="gs-title">Create Account</h1>
   <p class="gs-subtitle">Join 10,000+ users scaling with AI.</p>

   <form class="gs-form">
    <div class="gs-input-group">
     <label>Full Name</label>
     <input type="text" placeholder="John Doe" required>
    </div>

    <div class="gs-input-group">
     <label>Email Address</label>
     <input type="email" placeholder="name@company.com" required>
    </div>

    <div class="gs-input-group">
     <label>Password</label>
     <input type="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="gs-submit-btn">
     Get Started <i class="fa-solid fa-chevron-right"></i>
    </button>
   </form>

   <div class="gs-footer">
    Already have an account? <a href="signin.html">Sign In</a>
   </div>
  </div>
 </main>

</body>

</html>
